{% extends "base.html" %}
{% block title %}Login - Accommodation Buddy{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Accommodation Buddy</h1>
        <p class="auth-subtitle">Sign in to accommodate lesson materials for multilingual learners</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>
{% endblock %}
